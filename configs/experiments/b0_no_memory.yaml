# B0: No external memory baseline
llm:
  provider: "ollama"
  model: "llama3.2:latest"
  temperature: 0.0

memory:
  max_nodes: 200
  default_importance: 0.5
  decay_rate: 0.05

retrieval:
  mode: "none"
  max_results: 10
  neighbor_depth: 1
  include_edge_context: true

forgetting:
  policy: "none"
  budget_target: 200
  min_importance_to_keep: 0.3
  run_every_n_turns: 5

agent:
  system_prompt: |
    You are a helpful assistant. Answer questions based on your knowledge.
  extraction_prompt: ""
